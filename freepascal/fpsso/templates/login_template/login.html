<script>
    const PAGE_CONFIG = {
        title_browser: "เข้าสู่ระบบ - ERP Management System",
        sidebar_logo_title: "System",
        sidebar_logo_subtitle: "Authenticator",
        sidebar_main_title: "สำนักงานสาธารณสุขจังหวัดกำแพงเพชร",
        sidebar_desc: "<span id="txt-sidebar_desc"></span>",
        
        form_title: "ยินดีต้อนรับเข้าสู่ระบบ",
        form_subtitle: "System Authenticator",
        
        label_username: "Username",
        placeholder_username: "กรอก Username",
        
        label_password: "Password",
        placeholder_password: "กรอก Password",
        
        forgot_password_text: "ลืมรหัสผ่าน?",
        btn_signin_text: "เข้าสู่ระบบ",
        divider_text: "หรือเข้าสู่ระบบด้วย",
        
        label_thaid: "ThaID",
        label_google: "Google",
        label_providerid: "Provider ID",
        
        footer_text_1: "© 2026 กลุ่มงานสุขภาพดิจิทัล สำนักงานสาธารณสุขจังหวัดกำแพงเพชร",
        footer_text_2: "Version 1.69.7.07 (Build 20260707)"
    };

    // ฟังก์ชันนำค่าไปใส่ใน HTML เมื่อโหลดหน้าเว็บเสร็จ
    window.addEventListener("DOMContentLoaded", function() {
        document.title = PAGE_CONFIG.title_browser;
        
        const ids = Object.keys(PAGE_CONFIG);
        for (let i = 0; i < ids.length; i++) {
            const el = document.getElementById("txt-" + ids[i]);
            if (el) {
                el.innerText = PAGE_CONFIG[ids[i]];
            }
        }
        
        // สำหรับ placeholder ของ input (username / password)
        const userInp = document.getElementById('username');
        if (userInp) userInp.placeholder = PAGE_CONFIG.placeholder_username;
        
        const passInp = document.getElementById('password');
        if (passInp) passInp.placeholder = PAGE_CONFIG.placeholder_password;
    });
</script>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title></title>
    <link href="/assets/css/fonts.css" rel="stylesheet">
    <link href="/assets/fontawesome/css/all.min.css" rel="stylesheet">
    <style>
        :root {
            --primary:       #2563eb;
            --primary-hover: #1d4ed8;
            --text-main:     #0f172a;
            --text-muted:    #64748b;
            --border-color:  #cbd5e1;
            --transition:    250ms cubic-bezier(0.4, 0, 0.2, 1);
        }

        *, *::before, *::after {
            margin: 0; padding: 0; box-sizing: border-box;
        }

        body {
            font-family: 'Sarabun', sans-serif;
            background: radial-gradient(circle at 50% 50%, rgba(37, 99, 235, 0.15) 0%, transparent 70%), linear-gradient(135deg, #e0f2fe 0%, #bae6fd 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 1.5rem;
            color: var(--text-main);
        }

        /* ===== Main Container Card ===== */
        .login-box {
            display: flex;
            width: 100%;
            max-width: 1060px;
            height: 700px;
            max-height: calc(100vh - 3rem);
            background: #ffffff;
            border-radius: 20px;
            box-shadow: 0 25px 60px -15px rgba(0, 0, 0, 0.15), 0 0 40px -10px rgba(37, 99, 235, 0.05);
            overflow: hidden;
            position: relative;
            animation: cardEntrance 0.7s cubic-bezier(0.16, 1, 0.3, 1) both;
        }

        @keyframes cardEntrance {
            from { opacity: 0; transform: translateY(30px) scale(0.98); }
            to   { opacity: 1; transform: translateY(0) scale(1); }
        }

        /* ===== Left Pane (Branding Sidebar) ===== */
        .login-sidebar {
            width: 46%;
            background: linear-gradient(135deg, #08245c 0%, #000d2d 100%);
            position: relative;
            padding: 2.75rem 2.5rem 0rem;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            overflow: hidden;
            color: #ffffff;
        }

        .login-sidebar::before {
            content: '';
            position: absolute;
            top: -20%; left: -20%;
            width: 80%; height: 80%;
            background: radial-gradient(circle, rgba(255,255,255,0.12) 0%, transparent 65%);
            pointer-events: none;
            z-index: 1;
        }

        #sidebar-canvas {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            pointer-events: none;
            z-index: 1;
        }

        .sidebar-header {
            display: flex;
            align-items: center;
            gap: 0.85rem;
            margin-bottom: 2.5rem;
            z-index: 2;
        }

        .logo-box {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 44px;
            height: 44px;
            background: #ffffff;
            border-radius: 11px;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.05);
            flex-shrink: 0;
            padding: 3px;
        }

        .logo-box img {
            width: 100%;
            height: 100%;
            object-fit: contain;
        }

        .logo-text {
            display: flex;
            flex-direction: column;
        }

        .logo-title {
            font-size: 1.7rem;
            font-weight: 800;
            color: #ffffff;
            line-height: 1.1;
            letter-spacing: 0.03em;
        }

        .logo-subtitle {
            font-size: 0.72rem;
            font-weight: 500;
            color: rgba(255, 255, 255, 0.85);
            letter-spacing: 0.01em;
        }

        .sidebar-content {
            z-index: 2;
            margin-top: 0.5rem;
        }

        .sidebar-title {
            font-size: 1.9rem;
            font-weight: 700;
            color: #ffffff;
            line-height: 1.4;
            margin-bottom: 0.85rem;
        }

        .sidebar-desc {
            font-size: 0.82rem;
            color: rgba(255, 255, 255, 0.82);
            line-height: 1.6;
            font-weight: 400;
        }

        .sidebar-graphic {
            width: 100%;
            display: flex;
            justify-content: center;
            align-items: flex-end;
            margin-top: auto;
            z-index: 2;
            perspective: 800px;
        }

        .sidebar-graphic img {
            max-width: 88%;
            height: auto;
            object-fit: contain;
            transform: scale(1.02);
            transition: transform 0.5s ease;
            mix-blend-mode: screen;
            -webkit-mask-image: radial-gradient(circle, rgba(0,0,0,1) 30%, rgba(0,0,0,0) 70%);
            mask-image: radial-gradient(circle, rgba(0,0,0,1) 30%, rgba(0,0,0,0) 70%);
            transform-style: preserve-3d;
            backface-visibility: hidden;
            filter: contrast(1.2) brightness(0.85) saturate(1.1);
        }

        /* ===== Right Pane (Form Area) ===== */
        .login-form-pane {
            width: 54%;
            background: #ffffff;
            display: flex;
            flex-direction: column;
            padding: 3rem 3.5rem 2.25rem;
            height: 100%;
            overflow-y: auto;
        }

        .form-wrapper {
            margin-top: auto;
            margin-bottom: auto;
            width: 100%;
            max-width: 410px;
            align-self: center;
        }

        .form-header {
            margin-bottom: 1.75rem;
            text-align: left;
        }

        .form-title {
            font-size: 2.1rem;
            font-weight: 700;
            color: var(--text-main);
            margin-bottom: 0.35rem;
        }

        .form-subtitle {
            font-size: 0.85rem;
            color: var(--text-muted);
            font-weight: 500;
        }

        .form-group {
            margin-bottom: 0.95rem;
        }

        .form-label {
            display: block;
            font-size: 0.82rem;
            font-weight: 600;
            color: #334155;
            margin-bottom: 0.45rem;
        }

            position: relative;
        }

            background: #ffffff;
            border: 1px solid #cbd5e1;
            color: #1e293b;
            border-radius: 10px;

            font-size: 0.92rem;
            font-family: 'Sarabun', sans-serif;
            font-weight: 500;
            outline: none;
            transition: all var(--transition);
        }

        .form-input::placeholder {
            color: #94a3b8;
        }

        .form-input:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.12);
        }

            left: 0.95rem;

            font-size: 0.88rem;
            z-index: 2;
            display: flex;
            align-items: center;
        }

        .form-group:focus-within .input-icon-left {
            color: var(--primary);
        }

        .password-toggle:hover { color: var(--primary); }

            justify-content: flex-end;
            margin-top: 0.45rem;
        }

        }

            border-radius: 10px;

            font-weight: 700;
            font-family: 'Sarabun', sans-serif;

        }

            box-shadow: 0 6px 16px rgba(37, 99, 235, 0.3);
            transform: translateY(-1px);
        }

        .btn-signin:active { transform: translateY(0); }

        /* ===== Divider ===== */
        .divider {

        .divider-line {

        }

            height: 100%;

        }

            font-size: 0.76rem;
            font-weight: 600;
            color: #475569;
            margin-top: 0.5rem;
            text-align: center;
            transition: color var(--transition);
        }

        /* Hover States */
        .sso-grid-item:hover .sso-icon-box {
            transform: translateY(-4px);
            box-shadow: 0 8px 16px rgba(37, 99, 235, 0.15);
            border-color: var(--primary);
        }

        .sso-grid-item:hover .sso-icon-box.thaid-bg {
            box-shadow: 0 8px 16px rgba(11, 26, 48, 0.3);
        }

        .sso-grid-item:hover .sso-label {
            color: var(--primary);
        }

        .sso-grid-item:active {
            transform: scale(0.95);
        }

        /* ===== SSO Long Button (Wide Display) ===== */
        .sso-long-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.75rem;
            width: 100%;
            padding: 0.75rem 1rem;
            background: #ffffff;
            border: 1px solid #cbd5e1;
            border-radius: 12px;
            text-decoration: none;
            color: #475569;
            font-weight: 600;
            font-size: 0.875rem;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.05);
            transition: all var(--transition);
            margin-top: 1rem;
            cursor: pointer;
        }

        .sso-long-btn img {
            width: 24px;
            height: 24px;
            object-fit: contain;
            border-radius: 4px;
        }

        .sso-long-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 12px rgba(37, 99, 235, 0.1);
            border-color: var(--primary);
            color: var(--primary);
        }

        .sso-long-btn:active {
            transform: scale(0.98);
        }

        /* ===== Alerts ===== */
        .alert {
            display: flex;
            align-items: center;
            padding: 0.75rem 1rem;
            border-radius: 10px;
            margin-bottom: 1.25rem;
            font-size: 0.8rem;
            border: 1px solid;
            animation: alertSlide 0.4s ease both;
        }

        @keyframes alertSlide {
            from { opacity: 0; transform: translateY(-8px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        .alert-error {
            background: rgba(220, 60, 50, 0.06);
            border-color: rgba(220, 60, 50, 0.2);
            color: #c53030;
        }

        .alert-success {
            background: rgba(34, 197, 94, 0.06);
            border-color: rgba(34, 197, 94, 0.2);
            color: #15803d;
        }

        .alert-icon {
            margin-right: 0.75rem;
            font-size: 0.95rem;
            display: flex;
            align-items: center;
        }

        /* ===== Footer ===== */
        .form-footer {
            text-align: center;
            margin-top: auto;
            padding-top: 1.5rem;
        }

        .form-footer p {
            font-size: 0.72rem; color: var(--text-muted); font-weight: 400;
            line-height: 1.5;
        }

        /* ===== Responsive Adjustments ===== */
        @media (max-width: 992px) {
            body {
                padding: 1rem;
            }
            .login-box {
                height: auto;
                max-width: 480px;
                flex-direction: column;
            }
            .login-sidebar {
                display: none;
            }
            .login-form-pane {
                width: 100%;
                padding: 2.75rem 2rem 2.25rem;
            }
        }
    </style>
</head>

    <!-- Background dots script and interactive tilt script -->
    <script>
        function togglePasswordVisibility() {
            const pw = document.getElementById('password');
            const eye = document.getElementById('password-eye-icon');
            if (pw.type === 'password') {
                pw.type = 'text';
                eye.classList.replace('far', 'fas');
                eye.classList.replace('fa-eye', 'fa-eye-slash');
            } else {
                pw.type = 'password';
                eye.classList.replace('fas', 'far');
                eye.classList.replace('fa-eye-slash', 'fa-eye');
            }
        }

        // Particle Canvas Animation
        (function() {
            const canvas = document.getElementById('sidebar-canvas');
            if (!canvas) return;
            const ctx = canvas.getContext('2d');
            
            let width, height;
            let particles = [];
            const particleCount = 45;
            
            function resize() {
                width = canvas.width = canvas.offsetWidth;
                height = canvas.height = canvas.offsetHeight;
            }
            resize();
            window.addEventListener('resize', resize);
            
            class Particle {
                constructor() {
                    this.x = Math.random() * width;
                    this.y = Math.random() * height;
                    this.vx = (Math.random() - 0.5) * 0.4;
                    this.vy = (Math.random() - 0.5) * 0.4;
                    this.radius = Math.random() * 2 + 1;
                }
                update() {
                    this.x += this.vx;
                    this.y += this.vy;
                    if (this.x < 0 || this.x > width) this.vx *= -1;
                    if (this.y < 0 || this.y > height) this.vy *= -1;
                }
                draw() {
                    ctx.beginPath();
                    ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
                    ctx.fillStyle = 'rgba(255, 255, 255, 0.25)';
                    ctx.fill();
                }
            }
            
            for (let i = 0; i < particleCount; i++) {
                particles.push(new Particle());
            }
            
            function animate() {
                ctx.clearRect(0, 0, width, height);
                
                // Draw lines
                for (let i = 0; i < particles.length; i++) {
                    for (let j = i + 1; j < particles.length; j++) {
                        const dist = Math.hypot(particles[i].x - particles[j].x, particles[i].y - particles[j].y);
                        if (dist < 100) {
                            ctx.beginPath();
                            ctx.moveTo(particles[i].x, particles[i].y);
                            ctx.lineTo(particles[j].x, particles[j].y);
                            ctx.strokeStyle = `rgba(255, 255, 255, ${0.08 * (1 - dist / 100)})`;
                            ctx.lineWidth = 0.5;
                            ctx.stroke();
                        }
                    }
                }
                
                particles.forEach(p => {
                    p.update();
                    p.draw();
                });
                
                requestAnimationFrame(animate);
            }
            animate();
        })();

        // 3D Parallax Graphic Tilt
        (function() {
            const sidebar = document.querySelector('.login-sidebar');
            const graphic = sidebar.querySelector('.sidebar-graphic img');
            
            sidebar.addEventListener('mousemove', (e) => {
                const rect = sidebar.getBoundingClientRect();
                const x = e.clientX - rect.left;
                const y = e.clientY - rect.top;
                
                if (graphic) {
                    const w = rect.width;
                    const h = rect.height;
                    const rotateY = ((x / w) - 0.5) * 12; 
                    const rotateX = -((y / h) - 0.5) * 12;
                    graphic.style.transform = `scale(1.05) rotateX(${rotateX}deg) rotateY(${rotateY}deg)`;
                    graphic.style.transition = 'transform 0.08s ease';
                }
            });

            sidebar.addEventListener('mouseleave', () => {
                if (graphic) {
                    graphic.style.transform = 'scale(1.02) rotateX(0deg) rotateY(0deg)';
                    graphic.style.transition = 'transform 0.6s cubic-bezier(0.25, 1, 0.5, 1)';
                }
            });
        })();
    </script>

    <script>
        window.addEventListener('load', function() {
            const urlParams = new URLSearchParams(window.location.search);
            const error = urlParams.get('error');
            if (error) {
                document.getElementById('errorBox').style.display = 'flex';
                document.getElementById('errorText').innerText = decodeURIComponent(error);
            }
        });
    </script>
