<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Captive Portal - FortiGate</title>
    <!-- นำเข้าฟอนต์ Sarabun เพื่อความสวยงามและแสดงผลภาษาไทยได้ดี -->
    
    <style>
        /* สไตล์หลักและการตั้งค่าตัวแปรสีดีไซน์พรีเมียม */
        :root {
            --primary-color: #007bff;
            --primary-hover: #0056b3;
            --bg-gradient: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
            --card-bg: rgba(255, 255, 255, 0.95);
            --text-color: #333333;
            --text-muted: #666666;
            --border-color: #e2e8f0;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: var(--bg-gradient);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        /* กล่องการ์ดหน้าจอ Login */
        .login-card {
            background: var(--card-bg);
            border-radius: 16px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
            width: 100%;
            max-width: 420px;
            padding: 40px 30px;
            backdrop-filter: blur(10px);
            transition: transform 0.3s ease;
        }

        .login-card:hover {
            transform: translateY(-5px);
        }

        /* ส่วนหัวและโลโก้ */
        .header {
            text-align: center;
            margin-bottom: 30px;
        }

        .logo-box {
            background-color: var(--primary-color);
            color: #ffffff;
            width: 60px;
            height: 60px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 15px auto;
            font-size: 24px;
            font-weight: bold;
            box-shadow: 0 4px 10px rgba(0, 123, 255, 0.3);
        }

        .header h1 {
            font-size: 22px;
            color: var(--text-color);
            margin-bottom: 8px;
            font-weight: 600;
        }

        .header p {
            font-size: 14px;
            color: var(--text-muted);
        }

        /* ฟิลด์กรอกข้อมูลฟอร์ม */
        .form-group {
            margin-bottom: 20px;
            position: relative;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-size: 14px;
            color: var(--text-color);
            font-weight: 500;
        }

        .input-wrapper {
            position: relative;
        }

        .input-icon {
            position: absolute;
            left: 12px;
            top: 50%;
            transform: translateY(-50%);
            color: #a0aec0;
            display: flex;
            align-items: center;
        }

        .form-control {
            width: 100%;
            padding: 12px 12px 12px 40px;
            border: 1.5px solid var(--border-color);
            border-radius: 8px;
            font-size: 15px;
            font-family: inherit;
            color: var(--text-color);
            outline: none;
            transition: border-color 0.2s ease, box-shadow 0.2s ease;
        }

        .form-control:focus {
            border-color: var(--primary-color);
            box-shadow: 0 0 0 3px rgba(0, 123, 255, 0.15);
        }

        /* ปุ่มกดตกลงเข้าสู่ระบบ */
        .btn-submit {
            width: 100%;
            padding: 14px;
            background-color: var(--primary-color);
            border: none;
            border-radius: 8px;
            color: #ffffff;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: background-color 0.2s ease, transform 0.1s ease;
            box-shadow: 0 4px 10px rgba(0, 123, 255, 0.2);
            margin-top: 10px;
        }

        .btn-submit:hover {
            background-color: var(--primary-hover);
        }

        .btn-submit:active {
            transform: scale(0.98);
        }

        /* ข้อความแจ้งเตือนเมื่อเกิดความผิดพลาด */
        .error-message {
            background-color: #fed7d7;
            border: 1px solid #f5c6cb;
            color: #c53030;
            padding: 10px 12px;
            border-radius: 8px;
            font-size: 13px;
            margin-bottom: 20px;
            display: none;
            align-items: center;
        }

        /* ลิงก์ข้อตกลงและเงื่อนไขการใช้งาน */
        .terms {
            text-align: center;
            margin-top: 25px;
            font-size: 12px;
            color: var(--text-muted);
        }

        .terms a {
            color: var(--primary-color);
            text-decoration: none;
        }

        .terms a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>

    <!-- การ์ดฟอร์มการเข้าสู่ระบบ -->
    <div class="login-card">
        <div class="header">
            <!-- ส่วนจัดแสดงโลโก้จำลองหรือชื่อองค์กร -->
            <div class="logo-box">Wi-Fi</div>
            <h1>เชื่อมต่อระบบเครือข่าย</h1>
            <p>กรุณากรอกบัญชีผู้ใช้งานเพื่อเข้าสู่อินเทอร์เน็ต</p>
        </div>

        <!-- กล่องแสดงข้อผิดพลาดกรณีฟอร์มไม่สมบูรณ์ (ซ่อนไว้เริ่มต้น) -->
        <div class="error-message" id="errorBox">
            กรุณากรอกข้อมูลผู้ใช้งานและรหัสผ่านให้ถูกต้อง
        </div>

        <!-- ฟอร์มเข้าใช้งานระบบ Captive Portal ของ FortiGate -->
        <form action="/sso/auth/login" method="post" id="loginForm" onsubmit="return validateForm()">
            
            <!-- พารามิเตอร์ลับของ FortiGate ที่จำเป็นสำหรับกระบวนการตรวจสอบสิทธิ์ -->
            <!-- We might get these from URL query params, but in fpsso we can ignore them as we manage session -->
            <input type="hidden" name="magic" value="">
            <input type="hidden" name="redir" value="">

            <!-- ข้อมูลบัญชีผู้ใช้งาน -->
            <div class="form-group">
                <label for="username">ชื่อผู้ใช้งาน (Username)</label>
                <div class="input-wrapper">
                    <span class="input-icon">
                        <!-- ไอคอนรูปคน -->
                        <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                            <path stroke-linecap="round" stroke-linejoin="round" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"></path>
                        </svg>
                    </span>
                    <input type="text" name="username" id="username" class="form-control" placeholder="กรอกชื่อผู้ใช้งาน" autocomplete="username">
                </div>
            </div>

            <!-- รหัสผ่าน -->
            <div class="form-group">
                <label for="password">รหัสผ่าน (Password)</label>
                <div class="input-wrapper">
                    <span class="input-icon">
                        <!-- ไอคอนกุญแจ -->
                        <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                            <path stroke-linecap="round" stroke-linejoin="round" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"></path>
                        </svg>
                    </span>
                    <input type="password" name="password" id="password" class="form-control" placeholder="กรอกรหัสผ่าน" autocomplete="current-password">
                </div>
            </div>

            <!-- ปุ่มกดส่งแบบฟอร์มยืนยันตัวตน -->
            <button type="submit" class="btn-submit">เชื่อมต่ออินเทอร์เน็ต</button>
            
            <hr style="margin: 20px 0; border: 0; border-top: 1px solid #eee;">
            <p style="text-align: center; margin-bottom: 10px; font-size: 14px; color: #666;">หรือเข้าสู่ระบบผ่าน</p>
            
            <a href="/sso/auth/thaid" style="display: block; width: 100%; padding: 12px; background: #004d99; color: white; text-align: center; border-radius: 8px; text-decoration: none; margin-bottom: 10px; font-weight: bold;">เข้าสู่ระบบด้วย ThaID</a>
            <a href="/sso/auth/providerid" style="display: block; width: 100%; padding: 12px; background: #17a2b8; color: white; text-align: center; border-radius: 8px; text-decoration: none; font-weight: bold;">เข้าสู่ระบบด้วย MOPH ID (หมอพร้อม)</a>
            
        </form>

        <div class="terms">
            การกดปุ่มแสดงว่าท่านยอมรับ <a href="#">ข้อตกลงและเงื่อนไขการใช้งาน</a>
        </div>
    </div>

    <!-- โค้ดตรวจสอบความถูกต้องฟอร์มเบื้องต้นก่อนส่งข้อมูลกลับไปที่ FortiGate -->
    <script>
        function validateForm() {
            // ดึงอ้างอิงของ Input ฟิลด์ Username และ Password
            var usernameField = document.getElementById('username');
            var passwordField = document.getElementById('password');
            var errorBox = document.getElementById('errorBox');

            // ตรวจสอบความว่างเปล่าของข้อมูล
            if (usernameField.value.trim() === "" || passwordField.value.trim() === "") {
                // แสดงผลกล่องข้อความเตือนข้อผิดพลาด
                errorBox.style.display = 'block';
                return false; // ระงับการส่งฟอร์มชั่วคราว
            }

            // ซ่อนกล่องข้อความเตือนเมื่อข้อมูลถูกต้องเรียบร้อยแล้ว
            errorBox.style.display = 'none';
            return true; // อนุญาตให้ดำเนินการส่งข้อมูลไปที่ FortiGate
        }
    </script>
</body>
</html>
