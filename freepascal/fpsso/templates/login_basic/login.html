<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Basic Login</title>
</head>
<body>

    <h2>Login (Basic)</h2>

    <div id="errorBox" style="display: none; color: red; border: 1px solid red; padding: 10px; margin-bottom: 10px; width: fit-content;">
        <strong>Error:</strong> <span id="errorText"></span>
    </div>

    <form method="POST" action="/sso/auth/login">
        <div>
            <label for="username">Username:</label>
            <input type="text" id="username" name="username" required>
        </div>
        <br>
        <div>
            <label for="password">Password:</label>
            <input type="password" id="password" name="password" required>
        </div>
        <br>
        <button type="submit">Login</button>
    </form>

    <hr>
    
    <p>Or login with:</p>
    <ul>
        <li><a href="/sso/auth/thaid">ThaID</a></li>
        <li><a href="/sso/auth/google">Google</a></li>
        <li><a href="/sso/auth/providerid">Provider ID</a></li>
    </ul>

    <script>
        window.addEventListener('load', function() {
            const urlParams = new URLSearchParams(window.location.search);
            const error = urlParams.get('error');
            if (error) {
                document.getElementById('errorBox').style.display = 'block';
                document.getElementById('errorText').innerText = decodeURIComponent(error);
            }
        });
    </script>
</body>
</html>
