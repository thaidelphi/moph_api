<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>คู่มือการติดตั้งและตั้งค่าระบบ (How-To)</title>
    <!-- Use Marked.js for rendering markdown -->
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <style>
        body {
            font-family: 'Sarabun', 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            line-height: 1.6;
            color: #333;
            max-width: 900px;
            margin: 0 auto;
            padding: 20px;
            background-color: #f9f9f9;
        }
        .container {
            background-color: #fff;
            padding: 30px 40px;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        h1, h2, h3 {
            color: #0056b3;
        }
        code {
            background-color: #f4f4f4;
            padding: 2px 5px;
            border-radius: 4px;
            font-family: monospace;
            color: #d63384;
        }
        pre {
            background-color: #f4f4f4;
            padding: 15px;
            border-radius: 8px;
            overflow-x: auto;
        }
        pre code {
            color: #333;
            background-color: transparent;
            padding: 0;
        }
        blockquote {
            border-left: 4px solid #0056b3;
            margin: 0;
            padding-left: 15px;
            color: #555;
            background-color: #f0f7ff;
            padding: 10px 15px;
            border-radius: 0 4px 4px 0;
        }
    </style>
</head>
<body>
    <div class="container" id="content">
        <p>กำลังโหลดข้อมูล...</p>
    </div>

    <!-- The markdown content will be injected here by the server -->
    <script id="markdown-data" type="text/markdown">
{{MARKDOWN_CONTENT}}
    </script>

    <script>
        window.addEventListener('DOMContentLoaded', function() {
            var mdText = document.getElementById('markdown-data').innerHTML;
            // Decode potential HTML entities if server escapes them, or just parse directly
            document.getElementById('content').innerHTML = marked.parse(mdText);
        });
    </script>
</body>
</html>
